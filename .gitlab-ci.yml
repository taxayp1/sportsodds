stages:
  - build
  - update-manifests

variables:
  IMAGE_TAG_SHA: "registry.taxayp.com/taxayp/sportsodds:$CI_COMMIT_SHORT_SHA"
  IMAGE_TAG_LATEST: "registry.taxayp.com/taxayp/sportsodds:latest"
  CI_REGISTRY: "registry.taxayp.com"
  GITOPS_REPO: "gitlab.taxayp.com/taxayp/K8s-HomeLab-Gitops.git"

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "registry.taxayp.com": {
            "auth": "$(printf "%s:%s" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"
          }
        }
      }
      EOF
  script:
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_TAG_SHA}"
      --destination "${IMAGE_TAG_LATEST}"
      --cache=true
      --cache-ttl=168h

update-manifests:
  stage: update-manifests
  image: alpine:3.19
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache git curl
    - git config --global user.email "ci@taxayp.com"
    - git config --global user.name "GitLab CI"
  script:
    - git clone "https://gitlab-ci-token:${GITOPS_TOKEN}@${GITOPS_REPO}" gitops
    - cd gitops
    - |
      sed -i "s|registry.taxayp.com/taxayp/sportsodds:.*|registry.taxayp.com/taxayp/sportsodds:${CI_COMMIT_SHORT_SHA}|g" \
        apps/sportsodds/deployment.yaml \
        apps/sportsodds/cronjob.yaml \
        apps/sportsodds/racing-cronjob.yaml
    - git add apps/sportsodds/deployment.yaml apps/sportsodds/cronjob.yaml apps/sportsodds/racing-cronjob.yaml
    - |
      if ! git diff --staged --quiet; then
        git commit -m "ci: bump oddsjunction image to ${CI_COMMIT_SHORT_SHA}"
        git push
      else
        echo "No image tag changes to commit"
      fi
  dependencies:
    - build-image