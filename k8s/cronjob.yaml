
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oddsjunction-fetch
  namespace: oddsjunction
spec:
  schedule: "0 */12 * * *"
  # If a scheduled run is missed (e.g. cluster was down) by more than this
  # many seconds, skip it rather than firing a backlog of late catch-up runs.
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid   # never let two fetches overlap and double-write
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300   # kill a hung fetch after 5 minutes
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: oddsjunction-fetch
              image: gitlab-registry.gitlab.svc.cluster.local:5000/taxayp/oddsjunction:1987155b
              command: ["node", "cronFetch.js"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: oddsjunction-pg-app
                      key: uri
              envFrom:
                - secretRef:
                    name: oddsjunction-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
