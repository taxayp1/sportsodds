# Runs the odds fetch on a schedule, completely independent of the web
# Deployment's lifecycle. Restarting/redeploying the web pod no longer
# affects whether or when a fetch happens, and a fetch failure shows up
# as a distinctly failed Job rather than buried in web server logs.
#
# Schedule: 00:00 and 12:00 UTC daily (2 runs/day).
# Quota math: 7 sport keys x 2 runs/day = 14 requests/day = ~420/month,
# safely under the-odds-api free tier's 500/month cap with headroom for
# occasional manual `kubectl create job --from=cronjob/...` test runs.
#
# No PVC, no pod affinity here - that complexity existed only because
# SQLite + a ReadWriteOnce PVC required this Job's pod to land on the same
# node as the web Deployment's pod. Now that both talk to CloudNativePG over
# the network, this Job's pod can be scheduled on any node, same as any
# normal stateless workload.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oddsjunction-fetch
  namespace: oddsjunction
spec:
  schedule: "0 */12 * * *"
  # If a scheduled run is missed (e.g. cluster was down) by more than this
  # many seconds, skip it rather than firing a backlog of late catch-up runs.
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid   # never let two fetches overlap and double-write
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300   # kill a hung fetch after 5 minutes
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: oddsjunction-fetch
              image: REGISTRY_IMAGE_PLACEHOLDER  # must match deployment.yaml's image tag
              command: ["node", "cronFetch.js"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: oddsjunction-pg-app
                      key: uri
              envFrom:
                - secretRef:
                    name: oddsjunction-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
