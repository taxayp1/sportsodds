# Adjust ingressClassName and host to match your homelab ingress controller and DNS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oddsjunction
  namespace: oddsjunction
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: oddsjunction.taxayp.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oddsjunction
                port:
                  number: 80
  tls:
     - hosts:
       - oddsjunction.home.lab
       secretName: oddsjunction-tls
