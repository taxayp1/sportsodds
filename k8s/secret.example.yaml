# DO NOT commit this file with real values filled in.
#
# This is a template. Generate the real Secret out-of-band and apply it directly,
# or better - use sealed-secrets / sops-encrypted values so it CAN live in git safely.
# See the "Secrets in GitOps" note in README-deploy.md for both options.
apiVersion: v1
kind: Secret
metadata:
  name: oddsjunction-secrets
  namespace: oddsjunction
type: Opaque
stringData:
  ODDS_API_KEY: "REPLACE_ME"
  BETFAIR_APP_KEY: "REPLACE_ME"
  BETFAIR_USERNAME: "REPLACE_ME"
  BETFAIR_PASSWORD: "REPLACE_ME"
